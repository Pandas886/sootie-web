name: Build and Release SootieAI

on:
  workflow_dispatch:

jobs:
  init:
    name: Initialize Release
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.get_version.outputs.tag }}
    steps:
      - name: Checkout sootie-web code
        uses: actions/checkout@v4
        with:
          path: sootie-web

      - name: Checkout SootieAI code
        uses: actions/checkout@v4
        with:
          repository: Pandas886/SootieAI
          token: ${{ secrets.PAT_TOKEN }}
          path: SootieAI
          
      - name: Get Version
        id: get_version
        shell: bash
        working-directory: SootieAI
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}-$(date +'%Y%m%d%H%M')" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create Draft Release
    needs: init
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create Empty Draft Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SootieAI Release ${{ needs.init.outputs.release_tag }}"
          tag_name: "${{ needs.init.outputs.release_tag }}"
          draft: true
          # 不上传文件，只创建 Release 记录
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build on ${{ matrix.os }} (${{ matrix.arch }})
    needs: [init, create-release]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: x64
            dbcli_target: macos-x64
            script: "npm run dist:mac:x64"
          - os: macos-latest
            arch: arm64
            dbcli_target: macos-arm64
            script: "npm run dist:mac:arm64"
          - os: windows-latest
            arch: x64
            dbcli_target: windows-x64
            script: "npm run dist:win"

    steps:
      - name: Checkout sootie-web code
        uses: actions/checkout@v4
        with:
          path: sootie-web

      - name: Checkout SootieAI code
        uses: actions/checkout@v4
        with:
          repository: Pandas886/SootieAI
          token: ${{ secrets.PAT_TOKEN }}
          path: SootieAI
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ModelScope CLI
        run: python -m pip install modelscope

      - name: Install dependencies
        working-directory: SootieAI
        run: npm install

      - name: Prepare bundled runtime
        working-directory: SootieAI
        run: npm run setup:mingit

      - name: Prepare bundled db-cli
        working-directory: SootieAI
        run: npm run setup:dbcli -- --required --target ${{ matrix.dbcli_target }} --release latest

      - name: Build Application
        working-directory: SootieAI
        run: ${{ matrix.script }} -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac Artifacts to Release
        if: startsWith(matrix.os, 'macos')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.init.outputs.release_tag }}"
          files: |
            SootieAI/release/*.dmg
            SootieAI/release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifacts to Release
        if: startsWith(matrix.os, 'windows')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ needs.init.outputs.release_tag }}"
          files: SootieAI/release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Installers to ModelScope
        run: node scripts/upload-release-to-modelscope.js
        working-directory: sootie-web
        env:
          MODELSCOPE_TOKEN: ${{ secrets.MODELSCOPE_TOKEN }}
          MODELSCOPE_REPO_ID: peterpoker/sootie-releases
          MODELSCOPE_PYTHON: python
          MODELSCOPE_ARTIFACT_ROOT: ../SootieAI/release
